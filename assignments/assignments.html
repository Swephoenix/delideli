<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beställningsportal</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    :root {
        --blue: #0044FF;
        --yellow: #FFD500;
        --white: #FFFFFF;
        --text: #001144;
        --light-blue: #E5EDFF;
    }

    * { box-sizing: border-box; }

    body {
        background-color: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: 'Inter', sans-serif;
    }

    .iphone {
        width: 375px;
        height: 812px;
        background-color: var(--white);
        border-radius: 40px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.2), inset 0 0 0 10px #111;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .notch {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 150px;
        height: 30px;
        background-color: #111;
        border-bottom-left-radius: 20px;
        border-bottom-right-radius: 20px;
        z-index: 100;
    }

    .app-header {
        background-color: var(--blue);
        color: var(--white);
        padding: 50px 20px 20px;
        font-weight: 600;
        font-size: 18px;
        text-align: center;
        transition: background-color 0.3s;
    }

    .screen-container {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: var(--white);
    }

    .screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        padding: 30px 20px;
        box-sizing: border-box;
        transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s;
        transform: translateX(100%);
        opacity: 0;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
    }

    .screen.active {
        transform: translateX(0);
        opacity: 1;
    }

    .screen.previous {
        transform: translateX(-100%);
        opacity: 0;
    }

    h1 {
        font-size: 28px;
        color: var(--blue);
        margin: 0 0 10px 0;
        font-weight: 800;
        line-height: 1.1;
    }

    p.subtitle {
        color: var(--text);
        margin-bottom: 30px;
        font-size: 15px;
        opacity: 0.8;
    }

    .scroll-hint {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: var(--blue);
        border: none;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.3s, transform 0.3s;
        flex-shrink: 0;
    }

    .scroll-hint.visible {
        opacity: 1;
        pointer-events: auto;
    }

    .scroll-hint:active {
        transform: scale(0.9);
    }

    .scroll-hint svg {
        width: 20px;
        height: 20px;
        fill: var(--white);
    }

    .btn-group-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        flex: 1;
        min-height: 0;
    }

    .btn-group {
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        scroll-snap-type: y mandatory;
        -webkit-overflow-scrolling: touch;
        gap: 0;
        width: 100%;
        scrollbar-width: none;
        flex: 1;
        min-height: 0;
    }

    .btn-group::-webkit-scrollbar {
        display: none;
    }

    .select-btn {
        flex: 0 0 calc(100% / 3 - 10px);
        scroll-snap-align: start;
        background-color: var(--light-blue);
        color: var(--blue);
        border: 2px solid transparent;
        padding: 16px;
        border-radius: 16px;
        font-size: 18px;
        font-weight: 600;
        text-align: left;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 15px;
        min-height: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .select-btn:last-child {
        margin-bottom: 0;
    }

    .select-btn:active {
        background-color: var(--blue);
        color: var(--white);
    }

    .input-group {
        margin-bottom: 10px;
    }

    label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--blue);
        margin-bottom: 4px;
    }

    input, textarea {
        width: 100%;
        padding: 10px 12px;
        border: 2px solid var(--light-blue);
        border-radius: 10px;
        font-size: 14px;
        font-family: inherit;
        box-sizing: border-box;
        background: var(--white);
        transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
        outline: none;
        border-color: var(--blue);
    }

    textarea {
        resize: none;
        height: 60px;
    }

    .primary-btn {
        background-color: var(--yellow);
        color: var(--text);
        border: none;
        padding: 14px;
        border-radius: 16px;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        margin-bottom: 0;
        margin-top: 10px;
        box-shadow: 0 4px 0px #CCAA00;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .primary-btn:active {
        transform: translateY(4px);
        box-shadow: 0 0px 0px #CCAA00;
    }

    .back-arrow {
        position: absolute;
        bottom: 20px;
        left: 16px;
        width: 48px;
        height: 48px;
        background-color: var(--blue);
        border: none;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        transition: transform 0.2s, background-color 0.2s;
    }

    .back-arrow:active {
        transform: scale(0.9);
        background-color: #0033CC;
    }

    .back-arrow svg {
        width: 24px;
        height: 24px;
        fill: var(--white);
    }

    #screen2 h1, #screen3 h1 {
        font-size: 22px;
        margin-bottom: 4px;
    }

    #screen2 .subtitle, #screen3 .subtitle {
        margin-bottom: 14px;
        font-size: 13px;
    }

    .upload-area {
        border: 2px dashed var(--blue);
        background-color: var(--light-blue);
        border-radius: 16px;
        padding: 20px 16px;
        text-align: center;
        cursor: pointer;
        margin-bottom: 10px;
    }

    .upload-area svg {
        fill: var(--blue);
        width: 28px;
        height: 28px;
        margin-bottom: 6px;
    }

    .upload-text {
        color: var(--blue);
        font-weight: 600;
        font-size: 14px;
    }

    .file-badge {
        display: none;
        background: var(--blue);
        color: var(--white);
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 14px;
        margin-top: 10px;
        font-weight: 600;
    }

    /* Confirmation screen */
    .confirm-icon {
        width: 80px;
        height: 80px;
        background: var(--blue);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 20px auto;
    }

    .confirm-icon svg {
        width: 40px;
        height: 40px;
        fill: var(--white);
    }

    .ticket-card {
        background: var(--light-blue);
        border-radius: 16px;
        padding: 16px;
        color: var(--text);
        margin-top: 10px;
    }

    .ticket-card h3 {
        margin: 0 0 8px 0;
        font-size: 18px;
        color: var(--blue);
    }

    .ticket-card p {
        margin: 4px 0;
        font-size: 14px;
    }

    .spacer { flex: 1; }
</style>
</head>
<body>

<div class="iphone">
    <div class="notch"></div>
    <div class="app-header" id="appHeader">Skapa ärende</div>

    <div class="screen-container">

        <!-- Screen 1: Category -->
        <div class="screen active" id="screen1">
            <h1>Vad behöver du hjälp med?</h1>
            <p class="subtitle">Välj ett område för att skicka din förfrågan automatiskt.</p>

            <div class="btn-group-wrapper">
                <button class="scroll-hint" id="scrollUp" onclick="scrollCategories(-1)">
                    <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
                </button>
                <div class="btn-group" id="btnGroup">
                    <button class="select-btn" onclick="selectGroup('Beställa broschyrer')">
                        <div style="font-size: 18px; margin-bottom: 4px;">Beställa broschyrer</div>
                        <div style="font-size: 14px; font-weight: 400; opacity: 0.8;">Beställ tryckt material.</div>
                    </button>
                    <button class="select-btn" onclick="selectGroup('Frågor som gäller partiet')">
                        <div style="font-size: 18px; margin-bottom: 4px;">Frågor som gäller partiet</div>
                        <div style="font-size: 14px; font-weight: 400; opacity: 0.8;">Allmänna frågor och relaterade ärenden.</div>
                    </button>
                    <button class="select-btn" onclick="selectGroup('Videoskapande eller redigering')">
                        <div style="font-size: 18px; margin-bottom: 4px;">Videoskapande eller redigering</div>
                        <div style="font-size: 14px; font-weight: 400; opacity: 0.8;">Nya filmer eller redigering.</div>
                    </button>
                    <button class="select-btn" onclick="selectGroup('IT-frågor')">
                        <div style="font-size: 18px; margin-bottom: 4px;">IT-frågor</div>
                        <div style="font-size: 14px; font-weight: 400; opacity: 0.8;">Tekniska problem och support.</div>
                    </button>
                    <button class="select-btn" onclick="selectGroup('Nya bilder och grafik')">
                        <div style="font-size: 18px; margin-bottom: 4px;">Nya bilder och grafik</div>
                        <div style="font-size: 14px; font-weight: 400; opacity: 0.8;">Grafisk produktion och bildmaterial.</div>
                    </button>
                </div>
                <button class="scroll-hint" id="scrollDown" onclick="scrollCategories(1)">
                    <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
                </button>
            </div>
        </div>

        <!-- Screen 2: Details -->
        <div class="screen" id="screen2">
            <h1>Dina uppgifter</h1>
            <p class="subtitle">Vem kontaktar vi gällande detta?</p>

            <div class="input-group">
                <label>Namn</label>
                <input type="text" id="userName" placeholder="t.ex. Jane Doe" required>
            </div>
            <div class="input-group">
                <label>E-post</label>
                <input type="email" id="userEmail" placeholder="jane@exempel.se" required>
            </div>
            <div class="input-group">
                <label>Telefon (valfritt)</label>
                <input type="tel" id="userPhone" placeholder="070-123 45 67">
            </div>
            <div class="input-group">
                <label>Ämne</label>
                <input type="text" id="userSubject" placeholder="Kort rubrik på ditt ärende">
            </div>
            <div class="input-group">
                <label>Meddelande</label>
                <textarea id="userDesc" placeholder="Beskriv vad du behöver hjälp med..."></textarea>
            </div>

            <button class="primary-btn" onclick="nextScreen(3)">Fortsätt</button>
            <button class="back-arrow" onclick="goBack()">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
        </div>

        <!-- Screen 3: Confirm -->
        <div class="screen" id="screen3">
            <h1>Bekräfta & skicka</h1>
            <p class="subtitle">Granska dina uppgifter innan du skickar in.</p>

            <div class="ticket-card" id="summaryCard"></div>

            <button class="primary-btn" onclick="submitOrder()">Skicka in</button>
            <button class="back-arrow" onclick="goBack()">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
        </div>

        <!-- Screen 4: Success -->
        <div class="screen" id="screen4">
            <div class="spacer"></div>
            <div class="confirm-icon">
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <h1 style="text-align:center;">Tack!</h1>
            <p class="subtitle" style="text-align:center;">Ditt ärende har skickats in och kommer att hanteras snart.</p>

            <button class="primary-btn" onclick="resetApp()" style="margin-top:auto;">Nytt ärende</button>
        </div>

    </div>
</div>

<script>
    let assignmentData = { group: '', name: '', email: '', phone: '', subject: '', desc: '' };

    function scrollCategories(direction) {
        const btnGroup = document.getElementById('btnGroup');
        const itemHeight = btnGroup.querySelector('.select-btn').offsetHeight + 15;
        btnGroup.scrollBy({ top: direction * itemHeight, behavior: 'smooth' });
    }

    function updateScrollHints() {
        const btnGroup = document.getElementById('btnGroup');
        const scrollUp = document.getElementById('scrollUp');
        const scrollDown = document.getElementById('scrollDown');
        const atTop = btnGroup.scrollTop < 2;
        const atBottom = btnGroup.scrollHeight - btnGroup.scrollTop - btnGroup.clientHeight < 2;
        scrollUp.classList.toggle('visible', !atTop);
        scrollDown.classList.toggle('visible', !atBottom);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const btnGroup = document.getElementById('btnGroup');
        btnGroup.addEventListener('scroll', updateScrollHints);
        updateScrollHints();
    });

    function selectGroup(groupName) {
        assignmentData.group = groupName;
        nextScreen(2);
    }

    function goBack() {
        const current = document.querySelector('.screen.active');
        current.classList.replace('active', 'previous');
        const prevId = 'screen' + (parseInt(current.id.replace('screen', '')) - 1);
        document.getElementById(prevId).classList.remove('previous');
        document.getElementById(prevId).classList.add('active');
    }

    function nextScreen(step) {
        if (step === 3) {
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            if (!name || !email) {
                alert('Namn och e-post krävs för att fortsätta.');
                return;
            }
            assignmentData.name = name;
            assignmentData.email = email;
            assignmentData.phone = document.getElementById('userPhone').value.trim();
            assignmentData.subject = document.getElementById('userSubject').value.trim();
            assignmentData.desc = document.getElementById('userDesc').value.trim();

            // Build summary
            const card = document.getElementById('summaryCard');
            card.innerHTML = `
                <h3>${assignmentData.group}</h3>
                <p><strong>Avsändare:</strong> ${assignmentData.name}</p>
                <p><strong>E-post:</strong> ${assignmentData.email}</p>
                ${assignmentData.phone ? `<p><strong>Telefon:</strong> ${assignmentData.phone}</p>` : ''}
                ${assignmentData.subject ? `<p><strong>Ämne:</strong> ${assignmentData.subject}</p>` : ''}
                ${assignmentData.desc ? `<p style="margin-top:8px; font-style:italic;">"${assignmentData.desc}"</p>` : ''}
            `;
        }

        document.querySelector('.screen.active').classList.replace('active', 'previous');
        document.getElementById('screen' + step).classList.remove('previous');
        document.getElementById('screen' + step).classList.add('active');
    }

    async function submitOrder() {
        try {
            const res = await fetch('/api/assignments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    category: assignmentData.group,
                    name: assignmentData.name,
                    email: assignmentData.email,
                    phone: assignmentData.phone,
                    subject: assignmentData.subject,
                    message: assignmentData.desc,
                }),
            });
            if (res.ok) {
                nextScreen(4);
            } else {
                alert('Något gick fel. Försök igen.');
            }
        } catch (e) {
            console.error(e);
            alert('Kunde inte ansluta till servern.');
        }
    }

    function resetApp() {
        assignmentData = { group: '', name: '', email: '', phone: '', subject: '', desc: '' };
        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';
        document.getElementById('userPhone').value = '';
        document.getElementById('userSubject').value = '';
        document.getElementById('userDesc').value = '';

        const screens = document.querySelectorAll('.screen');
        screens.forEach(s => s.classList.remove('active', 'previous'));
        document.getElementById('screen1').classList.add('active');
    }
</script>

</body>
</html>
