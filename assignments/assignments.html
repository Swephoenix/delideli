<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beställningsportal</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    :root {
        --blue: #0044FF;
        --yellow: #FFD500;
        --white: #FFFFFF;
        --text: #001144;
        --light-blue: #E5EDFF;
    }

    * { box-sizing: border-box; }

    body {
        background-color: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 16px;
        font-family: 'Inter', sans-serif;
    }

    html.embed-mode, html.embed-mode body {
        width: 100%;
        height: 100%;
        min-height: 100%;
        overflow: hidden;
    }

    html.embed-mode body {
        background-color: var(--white);
    }

    .iphone {
        width: 375px;
        height: 812px;
        max-width: 100%;
        max-height: 100vh;
        background-color: var(--white);
        border-radius: 40px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.2), inset 0 0 0 10px #111;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    html.embed-mode .iphone {
        width: 100%;
        height: 100%;
        border-radius: 0;
        box-shadow: none;
    }

    .notch {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 150px;
        height: 30px;
        background-color: #111;
        border-bottom-left-radius: 20px;
        border-bottom-right-radius: 20px;
        z-index: 100;
    }

    .app-header {
        background-color: var(--blue);
        color: var(--white);
        padding: 50px 20px 20px;
        font-weight: 600;
        font-size: 18px;
        text-align: center;
        z-index: 10;
    }

    .screen-container {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: var(--white);
    }

    .screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        padding: 30px 20px;
        box-sizing: border-box;
        transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s;
        transform: translateX(100%);
        opacity: 0;
        display: flex;
        flex-direction: column;
    }

    .screen.active {
        transform: translateX(0);
        opacity: 1;
    }

    .screen.previous {
        transform: translateX(-100%);
        opacity: 0;
    }

    h1 {
        font-size: 28px;
        color: var(--blue);
        margin: 0 0 10px 0;
        font-weight: 800;
        line-height: 1.1;
    }

    p.subtitle {
        color: var(--text);
        margin-bottom: 20px;
        font-size: 15px;
        opacity: 0.8;
    }

    /* KORT-EFFEKT LOGIK */
    .btn-group-wrapper {
        flex: 1;
        position: relative;
        margin: 0 -20px; /* Expand to edges */
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .btn-group {
        flex: 1;
        overflow-y: auto;
        scroll-snap-type: y mandatory;
        padding: 24px 20px 120px; /* Minska toppluckan men behåll utrymme för sista kortet */
        scrollbar-width: none;
        -ms-overflow-style: none;
        perspective: 1000px; /* För 3D-effekt */
    }

    .btn-group::-webkit-scrollbar {
        display: none;
    }

    .select-btn {
        width: 100%;
        min-height: 110px;
        margin-bottom: 20px;
        scroll-snap-align: center;
        background-color: var(--light-blue);
        color: var(--blue);
        border: none;
        padding: 20px;
        border-radius: 24px;
        text-align: left;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-shadow: 0 10px 20px rgba(0, 68, 255, 0.1);
        
        /* Transition för smidighet när JS inte körs eller vid klick */
        transition: transform 0.1s ease-out, opacity 0.1s ease-out, background-color 0.2s;
        transform-origin: center center;
        will-change: transform, opacity;
    }

    .select-btn:active {
        background-color: var(--blue);
        color: var(--white);
    }

    .select-btn .title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 5px;
    }

    .select-btn .desc {
        font-size: 13px;
        font-weight: 400;
        opacity: 0.8;
    }

    /* Form Styles */
    .input-group { margin-bottom: 12px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--blue); margin-bottom: 4px; }
    input, textarea {
        width: 100%; padding: 12px; border: 2px solid var(--light-blue);
        border-radius: 12px; font-size: 14px; font-family: inherit;
    }
    textarea { height: 80px; resize: none; }

    .primary-btn {
        background-color: var(--yellow);
        color: var(--text);
        border: none;
        padding: 16px;
        border-radius: 18px;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 4px 0px #CCAA00;
        margin-top: 10px;
    }

    .primary-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px #CCAA00; }

    .back-arrow {
        position: absolute; bottom: 20px; left: 16px; width: 48px; height: 48px;
        background-color: var(--blue); border: none; border-radius: 50%;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .back-arrow svg { width: 24px; height: 24px; fill: var(--white); }

    .ticket-card { background: var(--light-blue); border-radius: 16px; padding: 16px; margin-top: 10px; }
    .ticket-card h3 { margin: 0 0 8px 0; color: var(--blue); }

    .success-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .success-icon {
        width: 80px;
        height: 80px;
        background: var(--blue);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
    }

    .success-icon svg {
        width: 40px;
        fill: white;
    }

    @media (max-width: 480px), (max-height: 860px) {
        body {
            align-items: stretch;
            padding: 0;
            background: var(--white);
        }

        .iphone {
            width: 100%;
            height: 100dvh;
            max-height: none;
            border-radius: 0;
            box-shadow: none;
        }

        .notch {
            display: none;
        }

        .app-header {
            padding-top: 24px;
        }

        .screen {
            padding: 24px 16px;
        }

        .btn-group-wrapper {
            margin: 0 -16px;
        }

        .btn-group {
            padding: 20px 16px 112px;
        }
    }

    #screen1 { overflow: hidden; }
</style>
</head>
<body>

<div class="iphone">
    <div class="notch"></div>
    <div class="app-header">Ny beställning</div>

    <div class="screen-container">
        <!-- Screen 1: Category Selection -->
        <div class="screen active" id="screen1">
            <h1>Vad kan vi hjälpa till med?</h1>
            <p class="subtitle">Scrolla bland valen för att hitta rätt kategori.</p>

            <div class="btn-group-wrapper">
                <div class="btn-group" id="cardContainer">
                    <button class="select-btn" onclick="selectGroup('Beställa broschyrer')">
                        <div class="title">Beställa broschyrer</div>
                        <div class="desc">Beställ tryckt material direkt till dörren.</div>
                    </button>
                    <button class="select-btn" onclick="selectGroup('Frågor om partiet')">
                        <div class="title">Frågor om partiet</div>
                        <div class="desc">Allmänna funderingar och politiska frågor.</div>
                    </button>
                    <button class="select-btn" onclick="selectGroup('Video & Redigering')">
                        <div class="title">Video & Redigering</div>
                        <div class="desc">Skapa nytt innehåll eller klipp om befintligt.</div>
                    </button>
                    <button class="select-btn" onclick="selectGroup('IT & Support')">
                        <div class="title">IT & Support</div>
                        <div class="desc">Problem med inloggning eller verktyg.</div>
                    </button>
                    <button class="select-btn" onclick="selectGroup('Grafisk Design')">
                        <div class="title">Grafisk Design</div>
                        <div class="desc">Nya logotyper, bilder eller mallar.</div>
                    </button>
                    <button class="select-btn" onclick="selectGroup('Event & Bokning')">
                        <div class="title">Event & Bokning</div>
                        <div class="desc">Hjälp med lokaler eller kampanjer.</div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Screen 2: Details -->
        <div class="screen" id="screen2">
            <h1>Dina uppgifter</h1>
            <div class="input-group">
                <label>Namn</label>
                <input type="text" id="userName" placeholder="För- och efternamn">
            </div>
            <div class="input-group">
                <label>E-post</label>
                <input type="email" id="userEmail" placeholder="namn@exempel.se">
            </div>
            <div class="input-group">
                <label>Ämne</label>
                <input type="text" id="userSubject" placeholder="Vad gäller det?">
            </div>
            <div class="input-group">
                <label>Meddelande</label>
                <textarea id="userDesc" placeholder="Beskriv ditt ärende..."></textarea>
            </div>
            <button class="primary-btn" onclick="nextScreen(3)">Granska ärende</button>
            <button class="back-arrow" onclick="goBack()"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
        </div>

        <!-- Screen 3: Review -->
        <div class="screen" id="screen3">
            <h1>Bekräfta</h1>
            <div class="ticket-card" id="summaryCard"></div>
            <button class="primary-btn" onclick="submitOrder()">Skicka in nu</button>
            <button class="back-arrow" onclick="goBack()"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
        </div>

        <!-- Screen 4: Success -->
        <div class="screen" id="screen4">
            <div class="success-state">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </div>
                <h1>Inskickat!</h1>
                <p>Vi återkommer så snart vi kan.</p>
            </div>
            <button class="primary-btn" onclick="resetApp()">Skapa nytt ärende</button>
        </div>
    </div>
</div>

<script>
    if (new URLSearchParams(window.location.search).get('embed') === '1') {
        document.documentElement.classList.add('embed-mode');
    }

    let assignmentData = { group: '', name: '', email: '', subject: '', desc: '' };

    // --- KORT-EFFEKT LOGIK ---
    const container = document.getElementById('cardContainer');
    
    function updateCardEffects() {
        const cards = container.querySelectorAll('.select-btn');
        const containerRect = container.getBoundingClientRect();
        const containerCenter = containerRect.top + containerRect.height / 2;

        cards.forEach(card => {
            const cardRect = card.getBoundingClientRect();
            const cardCenter = cardRect.top + cardRect.height / 2;
            
            // Räkna ut avstånd från mitten (0 = exakt i mitten)
            const distanceFromCenter = Math.abs(containerCenter - cardCenter);
            
            // Normalisera avståndet (0 till 1, där 1 är långt borta)
            const maxDistance = containerRect.height / 1.5;
            const normalizedDistance = Math.min(distanceFromCenter / maxDistance, 1);

            // Beräkna skala och opacitet
            const scale = 1 - (normalizedDistance * 0.15); // Skala ner till 85%
            const opacity = 1 - (normalizedDistance * 0.6); // Minska opacitet till 40%
            const rotate = (containerCenter - cardCenter) / 20; // Svag rotation för 3D-känsla

            card.style.transform = `scale(${scale}) rotateX(${rotate}deg)`;
            card.style.opacity = opacity;
            
            // Ge extra djup till kortet i mitten
            if (normalizedDistance < 0.2) {
                card.style.boxShadow = '0 15px 30px rgba(0, 68, 255, 0.2)';
            } else {
                card.style.boxShadow = '0 5px 15px rgba(0, 0, 0, 0.05)';
            }
        });
    }

    container.addEventListener('scroll', updateCardEffects);
    window.addEventListener('load', updateCardEffects);

    // --- NAVIGATION ---
    function selectGroup(group) {
        assignmentData.group = group;
        nextScreen(2);
    }

    function nextScreen(step) {
        if (step === 3) {
            assignmentData.name = document.getElementById('userName').value;
            assignmentData.email = document.getElementById('userEmail').value;
            assignmentData.subject = document.getElementById('userSubject').value;
            assignmentData.desc = document.getElementById('userDesc').value;

            document.getElementById('summaryCard').innerHTML = `
                <h3>${assignmentData.group}</h3>
                <p><strong>Från:</strong> ${assignmentData.name}</p>
                <p><strong>Ämne:</strong> ${assignmentData.subject}</p>
                <p style="margin-top:10px; font-style:italic;">"${assignmentData.desc}"</p>
            `;
        }

        document.querySelector('.screen.active').classList.replace('active', 'previous');
        document.getElementById('screen' + step).classList.remove('previous');
        document.getElementById('screen' + step).classList.add('active');
    }

    function goBack() {
        const active = document.querySelector('.screen.active');
        const step = parseInt(active.id.replace('screen', ''));
        active.classList.remove('active');
        document.getElementById('screen' + (step - 1)).classList.replace('previous', 'active');
    }

    async function submitOrder() {
        // Simulerar API-anrop
        setTimeout(() => nextScreen(4), 600);
    }

    function resetApp() {
        location.reload();
    }
</script>

</body>
</html>
